name: GHAction weather

on:
  push:
    branches: [main]


env:
  CACHE: docker.io/karolopalinski/cachedata2
  IMAGE: ghcr.io/karol-opalinski/weather

jobs:
  build:
    name:  Build Docker image
    runs-on: ubuntu-latest

    steps:
      -
        name: Check out the source_repo
        uses: actions/checkout@v4

      -
        name: QEMU set-up
        uses: docker/setup-qemu-action@v3

      -
        name: Buildx set-up
        uses: docker/setup-buildx-action@v3

      -
        name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - 
        name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - 
        name: Build image (local for scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: temp/weather:scan
          platforms: linux/amd64,linux/arm64
          outputs: type=oci,dest=/tmp/image.tar
          cache-from: |
            type=registry,ref=${{ env.CACHE }}
          cache-to: |
            type=registry,ref=${{ env.CACHE }},mode=max

      -
        name: Trivy scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          input: /tmp/image.tar
          severity: HIGH,CRITICAL
          exit-code: 1

      - 
        name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          platforms: linux/amd64,linux/arm64
          cache-from: |
            type=registry,ref=${{ env.CACHE }}
          cache-to: |
            type=registry,ref=${{ env.CACHE }},mode=max

